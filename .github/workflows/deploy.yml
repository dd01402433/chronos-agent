name: CD Pipeline (Vercel Deployment)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd landing_page
          npm install
        # 如果你已经扁平化了，请把上面一行改为: npm install

      - name: Build Project
        run: |
          cd landing_page
          npm run build
        # 如果你已经扁平化了，请把上面一行改为: npm run build

      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }}
        # 注意：官方 CLI 只需要 TOKEN 和 ORG_ID 即可，PROJECT_ID 由 Vercel 自动匹配
